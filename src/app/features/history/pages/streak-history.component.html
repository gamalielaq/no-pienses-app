<ion-header translucent="true">
    <ion-toolbar>
        <ion-buttons slot="start">
            <ion-back-button defaultHref="/tabs/dashboard"></ion-back-button>
        </ion-buttons>
        <ion-title>Historial</ion-title>
    </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
    <main class="streak-history">
        <section class="header-copy">
            <h1>Historial de rachas</h1>
            <p>Vista base para reimplementar el calendario y detalle diario.</p>
        </section>

        <section class="summary">
            <p>Sin logica activa en esta version.</p>
        </section>

        <ion-button expand="block" routerLink="/tabs/dashboard">Volver al Dashboard</ion-button>
    </main>
</ion-content>
