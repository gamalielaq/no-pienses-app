<ion-content [fullscreen]="true">
    <main class="onboarding">
        <img class="logo" src="/cerebro.png" alt="Logo Cerebro" />
        <span class="kicker">Modo enfoque</span>

        <h1>Haz lo que dijiste<br />que harias</h1>
        <p>Haz poco.<br />Pero hazlo.</p>

        <ion-button size="default" [disabled]="isSigningIn" (click)="signInWithGoogle()">
            {{ isSigningIn ? 'Conectando...' : 'Continuar con Google' }}
        </ion-button>
        @if (authError) {
            <small>{{ authError }}</small>
        }
        <small>Empieza con 1-3 habitos simples.</small>
    </main>
</ion-content>
