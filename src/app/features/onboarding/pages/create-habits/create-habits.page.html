<ion-content [fullscreen]="true">
    <main class="create-habits">
        <section class="copy">
            <h1>Define tus habitos base</h1>
            <p>Empieza con lo minimo. Tres son suficientes.</p>
        </section>

        <section class="creator">
            <ion-item lines="none" class="input-shell">
                <ion-input placeholder="Ej: Entrenar, Leer, Meditar..." maxlength="50"></ion-input>
                <ion-button slot="end" color="primary" fill="solid" shape="round" aria-label="Agregar habito">
                    Agregar
                </ion-button>
            </ion-item>
            <ion-text color="medium">
                <p class="validation">Plantilla base sin logica activa.</p>
            </ion-text>
        </section>

        <section class="progress">
            <p>0 de 3 configurados</p>
            <ion-progress-bar value="0"></ion-progress-bar>
        </section>

        <section class="list">
            <ion-list lines="none">
                <ion-item class="habit-item">
                    <ion-label>Tu lista aparecera aqui cuando implementemos logica.</ion-label>
                </ion-item>
            </ion-list>
        </section>

        <ion-button class="continue-btn" color="primary" expand="block" routerLink="/tabs/dashboard">
            Continuar
        </ion-button>
    </main>
</ion-content>
