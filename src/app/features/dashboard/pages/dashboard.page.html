<ion-header translucent="true">
    <ion-toolbar>
        <ion-buttons slot="start">
            <ion-menu-button autoHide="false"></ion-menu-button>
        </ion-buttons>
        <ion-title>Dashboard</ion-title>
    </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
    <main class="dashboard">
        <section class="section-copy">
            <h1>Base de trabajo</h1>
            <p>Esta vista esta limpia y lista para reimplementar logica.</p>
        </section>

        <section class="section-habits">
            <p>No hay datos cargados en esta version base.</p>
        </section>

        <section class="section-progress">
            <ion-button expand="block" routerLink="/tabs/habits">Ir a Habitos</ion-button>
            <ion-button expand="block" fill="outline" routerLink="/tabs/history">
                Ir a Historial
            </ion-button>
        </section>
    </main>
</ion-content>
