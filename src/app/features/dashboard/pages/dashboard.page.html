<ion-header translucent="true">
    <ion-toolbar>
        <ion-buttons slot="start">
            <ion-menu-button autoHide="false"></ion-menu-button>
        </ion-buttons>
        <ion-title>{{ todayLabel }}</ion-title>
        <ion-buttons slot="end">
            <ion-button fill="clear" class="identity-indicator-btn" (click)="goToFriends()">
                <ion-icon name="person-add-outline"></ion-icon>
            </ion-button>
            <ion-button fill="clear" class="identity-indicator-btn" (click)="goToIdentityChallenges()">
                <ion-icon name="people-outline"></ion-icon>
            </ion-button>
            <ion-button fill="clear" class="unlock-indicator-btn" (click)="onUnlockIndicatorClick()">
                <ion-badge [color]="habitLimitUnlocked() ? 'success' : 'medium'" class="unlock-badge">
                    <ion-icon [name]="habitLimitUnlocked() ? 'sparkles-outline' : 'lock-closed-outline'"></ion-icon>
                    <span>{{ habitLimit() }}</span>
                </ion-badge>
            </ion-button>
        </ion-buttons>
    </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
    <app-dashboard-habits [habits]="habits()" [completedTodayIds]="completedTodayIds()" [streakDays]="streakDays()"
      [isLoading]="isLoading()" [isUpdating]="isUpdating()" [pendingHabitIds]="pendingHabitIds()"
      [errorMessage]="errorMessage()" (habitToggle)="onHabitToggle($event)"
      (seedStreak)="onSeedStreak()"></app-dashboard-habits>

    <ion-modal [isOpen]="showUnlockRewardModal()" [backdropDismiss]="false">
        <ng-template>
            <ion-content class="reward-modal-content">
                <div class="reward-modal-body">
                    <ion-text color="primary">
                        <h2>&#x1F525; 7 dias consecutivos</h2>
                    </ion-text>
                    <ion-text color="white">
                        <p>Has demostrado constancia real. Ahora puedes agregar 2 habitos mas</p>
                    </ion-text>
                    <!-- <ion-button expand="block" color="primary" (click)="claimRewardAndGoCreateHabits()">
                        Agregar habitos
                    </ion-button>
                    <ion-button expand="block" fill="outline" color="medium" (click)="claimRewardAndContinue()">
                        Continuar
                    </ion-button> -->

                    <div class="ion-text-center">
                        <ion-button class="ion-margin-end" (click)="claimRewardAndGoCreateHabits()" size="default" shape="round" routerLink="/habits">
                            Agregar habitos
                        </ion-button>
                        <ion-button size="default" shape="round" (click)="claimRewardAndContinue()" fill="outline" routerLink="/history">
                            Lo haré despues
                        </ion-button>
                    </div>

                    <div class="ion-text-center ion-margin-top">
                        <ion-button size="small" fill="clear" color="medium">
                            Generar racha de 7 dias (test)
                        </ion-button>
                    </div>
                </div>
            </ion-content>
        </ng-template>
    </ion-modal>
</ion-content>
