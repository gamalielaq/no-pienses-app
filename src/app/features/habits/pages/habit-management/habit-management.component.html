<ion-header translucent="true">
    <ion-toolbar>
        <ion-buttons slot="start">
            <ion-menu-button autoHide="false"></ion-menu-button>
        </ion-buttons>
        <ion-title>Habitos</ion-title>
    </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
    <main class="habit-management">
        <section class="page-copy">
            <h1>Gestion de habitos</h1>
            <p>Plantilla limpia para construir CRUD y seguimiento desde cero.</p>
        </section>

        <section>
            <ion-button expand="block" routerLink="/onboarding/create-habits">
                Ir a Crear Habitos
            </ion-button>
            <ion-button expand="block" fill="outline" routerLink="/tabs/dashboard">
                Volver al Dashboard
            </ion-button>
        </section>
    </main>
</ion-content>
